name: Windows Build

# Wann soll die Action starten? 
# Bei jedem Push oder manuell per Knopfdruck (workflow_dispatch)
on:
  push:
    branches: [ "master", "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    # 1. Holt deinen Code aus dem Repository
    - name: Code auschecken
      uses: actions/checkout@v4

    # 2. Installiert Qt 6 für Windows (mit MinGW Compiler)
    - name: Qt installieren
      uses: jurplel/install-qt-action@v3
      with:
        version: '6.5.3'
        target: 'desktop'
        arch: 'win64_mingw'
        modules: 'qtmultimedia'

    # 3. Kompiliert das Projekt im src-Ordner
    - name: Kompilieren (qmake & make)
      run: |
        cd src
        qmake softProjector.pro
        mingw32-make

    # 4. Sammelt alle Windows-Bibliotheken (DLLs) zusammen
    - name: windeployqt ausführen
      run: |
        cd src/win32_build/bin
        windeployqt SoftProjector.exe

    # 5. Installiert Inno Setup
    - name: Inno Setup installieren
      run: choco install innosetup -y --no-progress

    # 6. Erzeugt ein Setup.exe mit Inno Setup
    - name: Installer bauen (Inno Setup)
      run: |
        & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" "installer\SoftProjector.iss"

    # 7. Lädt den fertigen Installer als Artifact hoch
    - name: Setup hochladen (Artifact)
      uses: actions/upload-artifact@v4
      with:
        name: SoftProjector-Setup
        path: installer/output/SoftProjector-Setup.exe